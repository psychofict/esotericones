<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="35%" stop-color="#BDE0F7"/>
      <stop offset="60%" stop-color="#EAF4FC"/>
      <stop offset="80%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#2E86DE" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="cloud1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloud2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EAF4FC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EAF4FC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>
  <!-- Clouds -->
  <ellipse cx="300" cy="180" rx="220" ry="60" fill="url(#cloud1)"/>
  <ellipse cx="380" cy="170" rx="160" ry="50" fill="url(#cloud1)"/>
  <ellipse cx="900" cy="120" rx="280" ry="55" fill="url(#cloud2)"/>
  <ellipse cx="1000" cy="110" rx="180" ry="45" fill="url(#cloud1)"/>
  <ellipse cx="1500" cy="200" rx="240" ry="65" fill="url(#cloud2)"/>
  <ellipse cx="1600" cy="190" rx="190" ry="50" fill="url(#cloud1)"/>
  <ellipse cx="600" cy="300" rx="300" ry="40" fill="url(#cloud2)"/>
  <ellipse cx="1300" cy="350" rx="250" ry="35" fill="url(#cloud2)"/>
  <!-- Subtle horizon shimmer -->
  <rect x="0" y="900" width="1920" height="180" fill="#2E86DE" opacity="0.05"/>
</svg>
