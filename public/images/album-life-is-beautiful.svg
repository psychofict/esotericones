<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="libGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2E86DE"/>
      <stop offset="50%" stop-color="#5BA3E6"/>
      <stop offset="100%" stop-color="#EAF4FC"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#libGrad)"/>
  <!-- Subtle geometric accents -->
  <circle cx="400" cy="100" r="120" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="80" cy="420" r="160" fill="#FFFFFF" opacity="0.06"/>
  <line x1="0" y1="350" x2="500" y2="320" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="370" x2="500" y2="345" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15"/>
  <!-- Title -->
  <text x="250" y="230" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#FFFFFF" letter-spacing="1">Life Is</text>
  <text x="250" y="280" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#FFFFFF" letter-spacing="1">Beautiful</text>
  <!-- Year -->
  <text x="250" y="330" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.7" letter-spacing="3">2022</text>
  <!-- Artist -->
  <text x="250" y="460" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.5" letter-spacing="4" text-transform="uppercase">EBSTAR</text>
</svg>
