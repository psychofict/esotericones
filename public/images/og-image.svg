<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="ogGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3A6B"/>
      <stop offset="40%" stop-color="#2E86DE"/>
      <stop offset="100%" stop-color="#5BA3E6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#ogGrad)"/>
  <!-- Subtle background elements -->
  <circle cx="200" cy="150" r="300" fill="#FFFFFF" opacity="0.03"/>
  <circle cx="1000" cy="500" r="350" fill="#FFFFFF" opacity="0.03"/>
  <!-- Main title -->
  <text x="600" y="290" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="bold" fill="#FFFFFF" letter-spacing="16">EBSTAR</text>
  <!-- Decorative line -->
  <line x1="420" y1="320" x2="780" y2="320" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-style="italic" fill="#FFFFFF" fill-opacity="0.7" letter-spacing="3">Artist / Producer / Songwriter</text>
  <!-- URL hint -->
  <text x="600" y="560" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.4" letter-spacing="4">ebstar.co.za</text>
</svg>
