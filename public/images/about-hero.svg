<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800">
  <defs>
    <linearGradient id="aboutSkyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E86DE" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#87CEEB" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#EAF4FC"/>
      <stop offset="85%" stop-color="#BDE0F7"/>
      <stop offset="100%" stop-color="#2E86DE" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E86DE" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2E86DE" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#aboutSkyGrad)"/>
  <!-- Atmospheric layers -->
  <rect x="0" y="0" width="1920" height="250" fill="#87CEEB" opacity="0.08"/>
  <!-- Cloud wisps -->
  <ellipse cx="400" cy="150" rx="300" ry="40" fill="#FFFFFF" opacity="0.3"/>
  <ellipse cx="1200" cy="100" rx="350" ry="45" fill="#FFFFFF" opacity="0.2"/>
  <ellipse cx="1600" cy="200" rx="250" ry="35" fill="#FFFFFF" opacity="0.25"/>
  <!-- Horizon glow -->
  <ellipse cx="960" cy="520" rx="800" ry="80" fill="#F39C12" opacity="0.05"/>
  <!-- Wave shapes at bottom -->
  <path d="M0 650 Q240 610, 480 640 Q720 670, 960 635 Q1200 600, 1440 640 Q1680 680, 1920 645 L1920 800 L0 800 Z" fill="url(#waveGrad)"/>
  <path d="M0 700 Q240 670, 480 690 Q720 710, 960 680 Q1200 650, 1440 685 Q1680 720, 1920 690 L1920 800 L0 800 Z" fill="#2E86DE" opacity="0.08"/>
  <path d="M0 740 Q240 720, 480 735 Q720 750, 960 725 Q1200 700, 1440 730 Q1680 760, 1920 735 L1920 800 L0 800 Z" fill="#2E86DE" opacity="0.12"/>
