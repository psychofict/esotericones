<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="crushGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8E44AD"/>
      <stop offset="60%" stop-color="#5B6ABF"/>
      <stop offset="100%" stop-color="#2E86DE"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#crushGrad)"/>
  <!-- Abstract geometric shapes -->
  <rect x="50" y="50" width="120" height="120" rx="8" fill="#FFFFFF" opacity="0.06" transform="rotate(15 110 110)"/>
  <rect x="330" y="320" width="140" height="140" rx="8" fill="#FFFFFF" opacity="0.05" transform="rotate(-10 400 390)"/>
  <circle cx="400" cy="80" r="60" fill="#FFFFFF" opacity="0.05"/>
  <!-- Decorative lines -->
  <line x1="40" y1="250" x2="460" y2="250" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15"/>
  <!-- Title -->
  <text x="250" y="220" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic" fill="#FFFFFF" letter-spacing="1">I Have a Crush</text>
  <text x="250" y="265" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic" fill="#FFFFFF" letter-spacing="1">on You</text>
  <!-- Subtitle -->
  <text x="250" y="310" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.6" letter-spacing="5">REMIXES</text>
  <!-- Artist -->
  <text x="250" y="465" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.5" letter-spacing="4">EBSTAR</text>
</svg>
